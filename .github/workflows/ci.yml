name: CI
on:
  push:
    branches: [main, feat/react-native-development, "feat/**"]
  pull_request:
    branches: [main, feat/react-native-development]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }

      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ github.sha }}
          restore-keys: turbo-

      - run: pnpm turbo run lint typecheck test build
        env:
          NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci
          BACKEND_API_URL: http://localhost:8000
          NEXT_PUBLIC_BACKEND_API_URL: http://localhost:8000
          NEXT_PUBLIC_REAL_API_MODULES: ""

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: '.nvmrc', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm dlx playwright install --with-deps chromium
      - run: pnpm --filter @dorsal/web test:e2e
        env:
          NEXTAUTH_SECRET: ci-secret-ci-secret-ci-secret-ci
          BACKEND_API_URL: http://localhost:8000
          NEXT_PUBLIC_BACKEND_API_URL: http://localhost:8000
          NEXT_PUBLIC_REAL_API_MODULES: ""
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
